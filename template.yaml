AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Fargate Infrastructure for Merck DevOps Challenge

Resources:
  ContainerRepo:
    Type: 'AWS::ECR::Repository'
    Properties:
      RepositoryName: devops-challenge-repo

  ECSCluster:
    Type: 'AWS::ECS::Cluster'
    Properties:
      ClusterName: devops-cluster

  LogGroup:
    Type: 'AWS::Logs::LogGroup'
    Properties:
      LogGroupName: /ecs/devops-api
      RetentionInDays: 7

  ExecutionRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'

  TaskDefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      Family: devops-task
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      ContainerDefinitions:
        - Name: devops-api
          Image: "794467105569.dkr.ecr.us-east-1.amazonaws.com/devops-challenge-repo:latest"
          PortMappings:
            - ContainerPort: 8080
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: ecs
name: Merck DevOps Challenge CD
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 794467105569.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and Push
        run: |
          docker build -t devops-challenge-repo .
          docker tag devops-challenge-repo:latest 794467105569.dkr.ecr.us-east-1.amazonaws.com/devops-challenge-repo:latest
          docker push 794467105569.dkr.ecr.us-east-1.amazonaws.com/devops-challenge-repo:latest

      - name: Deploy Infrastructure
        run: |
          aws cloudformation deploy --template-file template.yaml --stack-name devops-infra --capabilities CAPABILITY_IAM